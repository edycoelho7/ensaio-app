<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ensaio Ebenezer Ipe • EBNZ IPE</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#030814">
</head>
<body>
  <header class="topbar" style="display: flex; justify-content: space-between; align-items: center;">
    <div class="brand">
      <img class="logo-ebnz" src="ebnz.png" alt="Logo da Igreja" style="width: 40px; height: 40px; object-fit: contain;">
      <h1>Ensaio Ebenezer Ipe</h1>
    </div>

    <div class="auth-area" style="display: flex; align-items: center; gap: 15px;">
      <button id="loginBtn" class="btn primary" style="padding: 6px 12px; font-size: 14px;">Entrar</button>
      
      <div id="userProfile" style="display: none; align-items: center; gap: 10px;">
        <img id="userPic" src="" alt="Foto" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #00d2ff;">
        <button id="logoutBtn" class="btn" style="padding: 6px 12px; font-size: 14px;">Sair</button>
      </div>
    </div>
  </header>

  <div id="tela-login" class="container">
    <section class="card" style="text-align: center; padding: 40px 20px; max-width: 400px; margin: 0 auto;">
      <h2 style="margin-bottom: 10px;">Bem-vindo ao Ensaio Ebenezer Ipe</h2>
      <p class="muted" style="margin-bottom: 30px;">Faça o login para acessar o repertório.</p>
      
      <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
        <input id="emailInput" type="email" placeholder="Seu e-mail" style="padding: 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; width: 100%; box-sizing: border-box;" />
        <input id="senhaInput" type="password" placeholder="Sua senha" style="padding: 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; width: 100%; box-sizing: border-box;" />
        
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
          <button id="btnEntrarEmail" class="btn primary" style="flex: 1;">Entrar</button>
          <button id="btnCriarConta" class="btn" style="flex: 1;">Criar Conta</button>
        </div>

        <a id="btnEsqueciSenha" href="#" style="color: #00d2ff; font-size: 14px; text-decoration: none; margin-top: 15px; display: inline-block; text-align: center;">Esqueci minha senha</a>
      </div>

      <hr class="divider" style="margin: 24px 0;" />

      <button id="bigLoginBtn" class="btn" style="padding: 10px 24px; font-size: 16px; width: 100%; background: #ffffff; color: #000000; font-weight: bold;">
        Entrar com Google
      </button>
    </section>
  </div>
  <main id="tela-principal" class="container" style="display: none;">
    
    <section class="card">
      <label for="songSearch" class="lbl">Buscar música</label>
      <input id="songSearch" type="text" placeholder="Digite parte do nome ou artista…" />
      <ul id="songList" class="list"></ul>
      <hr class="divider" />
    </section>

    <section class="card">
      <div class="grid2">
        <div>
          <div id="songTitle" class="title-song">—</div>
          <div id="songArtist" class="muted">—</div>
        </div>
        <div class="meta">
          <div><span class="muted">BPM</span> <span id="bpmDisplay">—</span></div>
          <div><span class="muted">Compasso</span> <span id="tsDisplay">—</span></div>
        </div>
      </div>

      <div class="mt16">
        <div class="row-head" style="margin-bottom: 8px;">
          <span id="currentTimeDisplay" class="muted" style="font-size: 14px;">0:00</span>
          <span id="durationDisplay" class="muted" style="font-size: 14px;">0:00</span>
        </div>
        <input id="progressBar" class="slider" type="range" min="0" max="100" value="0" step="0.1" />
      </div>
      <div class="grid2 mt16">
        <button id="playBtn" class="btn primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" aria-hidden="true" style="margin-right:8px">
            <path d="M8 5v14l11-7z"></path>
          </svg>
          Play
        </button>
        <button id="stopBtn" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="white" aria-hidden="true" style="margin-right:6px">
      <path d="M6 6h12v12H6z"></path>
    </svg>
   Stop
  </button>
      </div>
    </section>

    <section class="card">
      <div class="row" style="margin-bottom: 24px;">
        <div class="row-head">
          <label class="lbl">Tom</label>
          <div style="text-align: right;">
            <span id="tomCifra" style="color: #00d2ff; font-weight: bold; margin-right: 10px;">-</span>
            <span id="tomDisplay" class="muted">0 st</span>
          </div>
        </div>
        <input id="tomSlider" class="slider" type="range" min="-5" max="6" step="1" value="0" />
        <div style="display: flex; justify-content: space-between; padding: 0 2px; margin-top: 6px; font-size: 11px; color: #6b7280; font-family: monospace;">
          <span>-5</span><span>-4</span><span>-3</span><span>-2</span><span>-1</span><span> 0</span><span>+1</span><span>+2</span><span>+3</span><span>+4</span><span>+5</span><span>+6</span>
        </div>
      </div>

      <div class="row">
        <div class="row-head">
          <label class="lbl">Voz</label>
          <span id="vozPct" class="muted">70%</span>
        </div>
        <input id="vozVol" class="slider" type="range" min="0" max="1" step="0.01" value="0.7" />
      </div>

      <div class="row">
        <div class="row-head">
          <label class="lbl">Playback</label>
          <span id="playbackPct" class="muted">80%</span>
        </div>
        <input id="playbackVol" class="slider" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>

      <div class="row">
        <div class="row-head">
          <label class="lbl">Metrônomo</label>
          <span id="metroPct" class="muted">50%</span>
        </div>
        <input id="metroVol" class="slider" type="range" min="0" max="1" step="0.01" value="0.5" />
      </div>
    </section>

    <input id="bpm" type="hidden" value="120" />
    <input id="timeSig" type="hidden" value="4" />
    <input id="offset" type="hidden" value="0.00" />
  </main>

  <footer class="footer muted">
    <small>EBNZ • App de Ensaio — v1 (HTML/JS puro)</small>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <script type="module" src="app/app.js"></script>
</body>
</html>
